<!DOCTYPE html>
<html lang="en">
   <head>
       <title>Table</title>
       <style>
        table {
            border: 1px solid red;
            border-collapse:collapse;
            
            
        }
        td ,th{ 
            border: 1px solid blue;
            padding:5px;
        }

       </style>
   </head>
   <body>
      <table>
        <thead>
            <tr>
                <th>"Ocean"</th>
                <th>"Average depth"</th>
                <th>"Maximum Depth" </th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>"Pacific ocean"</td>
                <td> "600 feet"</td>
                <td> "11000 feet"</td>
            </tr>
        </tbody>

      </table>
       
   </body>
</html>
