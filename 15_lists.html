<!DOCTYPE html>
<html lang="en">
   <head>
       <title>Lists</title>
   </head>
   <body>
       An order list:
        <ol>
            <li>First item</li>
            <li>Second item</li>
            <li>Third item</li>
        </ol>
       An unordered list:
       <ul>
            <li>One item</li>
            <li>Two item</li>
            <li>Three item</li>
        </ul>
   </body>
</html>
